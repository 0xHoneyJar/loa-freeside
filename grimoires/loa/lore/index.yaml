# Lifecycle States (T2.4, cycle-047 — RFC-style model)
#
# Transitions:
#   Active → Challenged     (counter-evidence found in bridge review)
#   Challenged → Active     (challenge resolved, pattern reaffirmed)
#   Active → Deprecated     (superseded by a better pattern)
#   Deprecated → Superseded (replacement pattern reaches Active)
#
# Status enum: Active, Challenged, Deprecated, Superseded
# Each entry in patterns.yaml carries: status, challenges[], lineage, superseded_by
